# `profile.ps1` targets the OneDrive-redirected Documents path, which only
# exists on Windows, so it is gated. `abbr.ps1` / `commands.ps1` land in the
# cross-platform PowerShell Core config dir and stay ungated.
[[file]]
source = "profile.ps1"
target = "~/OneDrive/Documents/PowerShell/Microsoft.PowerShell_profile.ps1"
when = "patina.os == 'windows'"

[[file]]
source = "abbr.ps1"
target = "~/.config/powershell/PSAbbreviations.ps1"

[[file]]
source = "commands.ps1"
target = "~/.config/powershell/commands.ps1"
